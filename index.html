<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Suporte Bsoft TMS - IA (V3.0 Sheets)</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-glass: rgba(255, 255, 255, 0.96);
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.15);
            --radius: 16px;
        }
		
        .reason-box {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            width: 100%;
        }

        .reason-box textarea {
            width: 100%;
            min-height: 80px;
            max-height: 300px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        .reason-box button {
            align-self: flex-end;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        body {
            font-family: 'Segoe UI', Inter, system-ui, sans-serif;
            margin: 0; padding: 0;
            background-color: #f0f2f5;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url("https://bsoft.com.br/blog/wp-content/uploads/2025/03/bsoft-960x500.webp");
            background-repeat: no-repeat; background-size: cover; background-attachment: fixed; background-position: center;
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .main-container {
            background-color: var(--bg-glass);
            width: 100%; max-width: 900px; height: 95vh;
            border-radius: var(--radius); box-shadow: var(--shadow);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        header {
            padding: 15px 20px; border-bottom: 1px solid #e2e8f0;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.98); z-index: 10;
        }
        h1 { margin: 0; font-size: 18px; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        .badge { font-size: 11px; background:#dcfce7; color:#166534; padding:3px 8px; border-radius:12px; font-weight: bold; }

        .btn-stats {
            font-size: 14px; background: #f1f5f9; border: 1px solid #e2e8f0;
            padding: 5px 12px; border-radius: 8px; cursor: pointer; color: #475569;
            display: flex; align-items: center; gap: 5px; transition: 0.2s;
        }
        .btn-stats:hover { background: #e2e8f0; }

        /* Estilo do Painel Admin */
        #adminPanel {
            display: none; flex-direction: column; gap: 10px; padding: 15px;
            background: #fffbeb; border-bottom: 2px solid #fcd34d;
        }
        #adminPanel input, #adminPanel textarea {
            padding: 10px; border: 1px solid #fcd34d; border-radius: 8px; outline: none; font-size: 14px;
        }

        #chatStream {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
            background-color: #f8fafc; scroll-behavior: smooth;
        }

        .message {
            max-width: 85%; padding: 12px 16px; border-radius: 12px;
            line-height: 1.5; font-size: 15px; position: relative; word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        .user-msg {
            align-self: flex-end; background-color: var(--primary-color);
            color: white; border-bottom-right-radius: 2px; box-shadow: 0 2px 5px rgba(37,99,235,0.2);
        }
        .ai-msg {
            align-self: flex-start; background-color: white;
            color: #1e293b; border: 1px solid #e2e8f0; border-bottom-left-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .feedback-area {
            display: flex; gap: 10px; margin-top: 10px; padding-top: 8px;
            border-top: 1px dashed #e2e8f0; font-size: 12px; color: #64748b; align-items: center;
        }
        .feedback-btn {
            background: white; border: 1px solid #e2e8f0; border-radius: 4px;
            cursor: pointer; padding: 2px 8px; transition: 0.2s;
        }

        #btnOfflineResults {
            display: none; position: absolute; right: 25px; bottom: 110px;
            background-color: #facc15; color: #854d0e; border: none;
            padding: 12px 20px; border-radius: 25px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 100;
            font-size: 14px; transition: 0.3s;
        }

        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: white; margin: 5vh auto; padding: 25px;
            width: 90%; max-width: 700px; border-radius: var(--radius);
            max-height: 85vh; overflow-y: auto; position: relative; box-shadow: var(--shadow);
        }
        .close-modal { position: sticky; top: 0; float: right; font-size: 28px; font-weight: bold; cursor: pointer; color: #94a3b8; }

        .input-area { padding: 20px; background: white; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; align-items: center; }
        #searchInput { flex: 1; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 24px; font-size: 15px; outline: none; }
        .send-btn { width: 45px; height: 45px; background: var(--primary-color); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center; }

        .result-item { background: #f8fafc; padding: 15px; border-left: 4px solid #f59e0b; margin-bottom: 15px; border-radius: 6px; font-size: 14px; color: #334155; }
        .suggestions { padding: 10px 20px; background: #f1f5f9; font-size: 12px; white-space: nowrap; overflow-x: auto; border-top: 1px solid #e2e8f0; }
        .suggestions a { color: #2563eb; text-decoration: none; cursor: pointer; margin-right: 8px; background: white; padding: 4px 10px; border-radius: 12px; border: 1px solid #e2e8f0; display: inline-block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>🤖 Suporte Bsoft <span class="badge">Online</span></h1>
        <div style="display: flex; gap: 8px;">
            <button class="btn-stats" onclick="showAnalytics()">📊 <span>Relatório</span></button>
            <button onclick="openAdmin()" style="border:none; background:none; cursor:pointer; font-size:18px; padding: 5px;">🔑</button>
        </div>
    </header>

    <div id="adminPanel">
        <strong style="color: #92400e;">🛠️ Adicionar Erro ao Banco de Dados</strong>
        <input type="text" id="newError" placeholder="Título do Erro (Ex: CT-e sem averbação)">
        <textarea id="newSolution" placeholder="Solução detalhada..."></textarea>
        <div style="display:flex; gap:10px; justify-content: flex-end;">
            <button onclick="closeAdmin()" style="background:#e2e8f0; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">Cancelar</button>
            <button onclick="saveToDatabase()" style="background:#d97706; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">Gravar na Planilha</button>
        </div>
    </div>

    <div id="chatStream">
        <div class="message ai-msg">
            Olá! Sou o assistente Bsoft. <br>
            Base de dados sincronizada com sucesso!. <br>
            <b>Qual é a situação?</b>
        </div>
    </div>

    <button id="btnOfflineResults" onclick="openModal()">📑 Exibir Resultados Offline</button>

    <div class="suggestions" id="topTermsBar">
        <span>Em alta:</span> 
        <a onclick="fillAndSend('CT-e sem averbação')">CT-e Averbação</a>
        <a onclick="fillAndSend('Erro de validação')">Erro Validação</a>
        <a onclick="fillAndSend('MDF-e Encerrado')">MDF-e</a>
    </div>

    <div class="input-area">
        <input type="text" id="searchInput" placeholder="Digite sua dúvida..." autofocus>
        <button class="send-btn" onclick="handleChat()">➤</button>
    </div>
</div>

<div id="resultsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="color: #1e293b; font-size: 18px; margin-top: 0;">🔍 Manual Técnico: Resultados Offline</h2>
        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin-bottom: 20px;">
        <div id="modalBody"></div>
    </div>
</div>

<script>

	let lastQuery = "";
    // Configurações mantidas
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8CAmTxO2pEmtc9ZILYJEBh3NX4j_RdlIk3-4gNfTnG3Ki-8_qWtYTCdfLUfHpPNep/exec";
    const p1 = "AIzaSyChy-QK5U1";
    const p2 = "-KJJUNYDrKa";
    const p3 = "krOqi5JWf-aqo";
    const GEMINI_API_KEY = p1 + p2 + p3; 
    const CORRECT_PASSWORD = "camargo02";

    let fileContent = "";
    let currentResults = []; 
    let searchLogs = [];

    const SINONIMOS = {
        "imprimir": ["gerar", "emitir", "visualizar", "danfe", "dacte", "damdf"],
        "gerar": ["emitir", "fazer", "imprimir", "criar"],
        "averbação": ["averbar", "seguro", "atm", "porto seguro"],
        "ct-e": ["cte", "conhecimento", "transporte"],
        "mdf-e": ["mdfe", "manifesto"],
        "cancelar": ["estornar", "anular", "inutilizar"],
        "pagamento": ["financeiro", "baixa", "receber", "contas"],
        "configurar": ["configuro", "parametrizo", "parametrizar", "settings"],
        "Tem como": ["Como faz", "é possível", "Possível", "Possibilidade", "Tutorial"],
        "Passo a passo": ["Como faz", "Tutorial", "Tem como"],
        "cliente": ["remetente", "destinatário", "tomador"]
    };

    window.onload = () => {
        loadData();
        const input = document.getElementById('searchInput');
        input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleChat(); });
        input.focus();
    };

    // CARREGA DADOS DA PLANILHA (Substitui o GitHub)
    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            // Transforma o JSON da planilha no formato de blocos que o chat entende
            fileContent = data.map(item => `### ERRO: ${item.erro} SOLUÇÃO: ${item.solucao}`).join('\n\n');
        } catch (e) { appendMessage('ai', "⚠️ Erro ao carregar banco de dados da planilha."); }
    }

    // ÁREA ADMINISTRATIVA
    function openAdmin() {
        if (prompt("Senha Administrativa:") === CORRECT_PASSWORD) {
            document.getElementById('adminPanel').style.display = 'flex';
        }
    }

    function closeAdmin() {
        document.getElementById('adminPanel').style.display = 'none';
    }

    async function saveToDatabase() {
        const erro = document.getElementById('newError').value.trim();
        const solucao = document.getElementById('newSolution').value.trim();

        if (!erro || !solucao) return alert("Preencha o erro e a solução!");

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "addKnowledge", erro: erro, solucao: solucao })
            });
            alert("Sucesso! O conhecimento foi enviado para a planilha.");
            document.getElementById('newError').value = "";
            document.getElementById('newSolution').value = "";
            closeAdmin();
            loadData(); // Recarrega o "cérebro" da IA com o novo dado
        } catch (e) {
            alert("Erro ao gravar na planilha.");
        }
    }

    // ANALYTICS (Mantendo sua lógica de relatório)
    async function logSearch(query, foundOffline) {
        const payload = { pergunta: query, encontrou: foundOffline ? "Sim" : "Não", feedback: "Pendente" };
        try {
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        } catch (e) { console.error("Erro log", e); }
    }

async function showAnalytics() {
    const modal = document.getElementById('resultsModal');
    const body = document.getElementById('modalBody');
    const title = document.getElementById('modalTitle');
    
    title.innerText = "📊 Relatório Global de Operação";
    body.innerHTML = "<em>Carregando dados...</em>";
    modal.style.display = "block";

    try {
        const response = await fetch(SCRIPT_URL + "?tipo=logs");
        const data = await response.json();
        
        let html = `<table style="width:100%; font-size:12px; border-collapse: collapse;">
                    <tr style="background:#f1f5f9; text-align:left;">
                        <th style="padding:8px; border-bottom: 2px solid #e2e8f0;">Data</th>
                        <th style="padding:8px; border-bottom: 2px solid #e2e8f0;">Pergunta</th>
                        <th style="padding:8px; border-bottom: 2px solid #e2e8f0; text-align:center;">Manual?</th>
                        <th style="padding:8px; border-bottom: 2px solid #e2e8f0; text-align:center;">Feedback</th>
                    </tr>`;
        
        data.slice(1).reverse().slice(0, 20).forEach(row => {
            // Pular as linhas de feedback genérico para não duplicar no relatório
            if (row[1] === "FEEDBACK_USUARIO") return;

            const dt = row[0] ? new Date(row[0]).toLocaleDateString('pt-BR') : '-';
            const manualIcon = row[2] === "Sim" ? "✅" : "❌";
            
            // Lógica dos Emojis
            let feedbackIcon = "⏳"; 
            if (row[3] === "Positivo") feedbackIcon = "👍";
            if (row[3] === "Negativo" || row[3].includes("NEGATIVO")) feedbackIcon = "👎";

            html += `<tr style="border-bottom:1px solid #e2e8f0;">
                <td style="padding:10px 8px; color: #64748b;">${dt}</td>
                <td style="padding:10px 8px; font-weight: 500;">${row[1]}</td>
                <td style="padding:10px 8px; text-align:center;">${manualIcon}</td>
                <td style="padding:10px 8px; text-align:center; font-size: 16px;">${feedbackIcon}</td>
            </tr>`;
        });
        
        html += "</table>";
        body.innerHTML = html;
    } catch (e) {
        body.innerHTML = "❌ Erro ao carregar.";
    }
}
    // FEEDBACK (Mantendo sua lógica detalhada)
    function saveFeedback(logIndex, type, btn) {
    const parent = btn.parentElement;
    const statusFeedback = type === 'positivo' ? "Positivo" : "Negativo";
    
    // Envia o feedback atrelado à última pergunta feita
    fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
            pergunta: lastQuery || "Pergunta não identificada", 
            encontrou: "Sim",
            feedback: statusFeedback
        })
    });

    if (type === 'positivo') {
        parent.innerHTML = "<span style='color:#166534; font-weight:bold;'>Obrigado! 👍</span>";
    } else {
        parent.innerHTML = `
            <div class="reason-box" style="display:flex;">
                <textarea id="reason_${logIndex}" placeholder="O que faltou na resposta?"></textarea>
                <button onclick="sendDetailedFeedback(${logIndex}, this)">Enviar</button>
            </div>`;
    }
}

    async function sendDetailedFeedback(logIndex, btn) {
        const textarea = document.getElementById(`reason_${logIndex}`);
        const motivo = textarea.value.trim();
        if (!motivo) return alert("Descreva o problema!");
        logSearch(`FEEDBACK_NEGATIVO: ${motivo}`, false);
        btn.parentElement.parentElement.innerHTML = "<span style='color:#991b1b; font-weight:bold;'>Obrigado! Feedback enviado.</span>";
    }

    // BUSCA E CHAT (Mantendo sua lógica original de pontuação e IA)
    function handleChat() {
        const input = document.getElementById('searchInput');
        const query = input.value.trim();
        if (!query) return;
		lastQuery = query;
        appendMessage('user', query);
        input.value = "";

        const results = searchDatabaseLogic(query);
        currentResults = results; 
        logSearch(query, results.length > 0);

        document.getElementById('btnOfflineResults').style.display = results.length > 0 ? "block" : "none";

        let contextForAI = results.length > 0 
            ? `DADOS DO MANUAL:\n${results.slice(0, 4).map(r => r.block).join("\n---\n")}`
            : `Busca geral de logística/TMS.`;

        askAIWithRotation(query, contextForAI, 0);
    }

    function searchDatabaseLogic(query) {
        if (!fileContent) return [];
        const qLower = query.toLowerCase();
        const stopWords = ["como", "fazer", "o", "a", "de", "do", "da", "em", "para", "erro", "no", "na", "está", "com"];
        let searchTerms = qLower.split(' ').filter(word => !stopWords.includes(word) && word.length > 2);
        
        let expandedTerms = [...searchTerms];
        searchTerms.forEach(term => {
            for (let key in SINONIMOS) {
                if (term.includes(key) || key.includes(term)) expandedTerms.push(...SINONIMOS[key]);
            }
        });

        const blocks = fileContent.split('###');
        let scoredResults = [];
        blocks.forEach(block => {
            if (!block.trim()) return;
            let score = 0;
            const blockLower = block.toLowerCase();
            if (blockLower.includes(qLower)) score += 200;
            [...new Set(expandedTerms)].forEach(word => { if (blockLower.includes(word)) score += 50; });
            if (score > 10) scoredResults.push({ block, score });
        });
        return scoredResults.sort((a, b) => b.score - a.score);
    }

    async function askAIWithRotation(question, context, logIndex) {
        const loadingDiv = appendMessage('ai', '<em>🧠 Iniciando busca técnica...</em>');
        const MODELO_PRIMARY = "gemma-3-27b-it";
        const maxTentativas = 5;

        async function executarCiclo(tentativa) {
            if (tentativa > maxTentativas) {
                loadingDiv.innerHTML = "❌ Servidor sobrecarregado. Tente novamente.";
                return;
            }
            const tempoEspera = Math.pow(2, tentativa) * 1000;
            loadingDiv.innerHTML = `<em>🧠 Buscando conhecimentos ${tentativa}/${maxTentativas}...</em>`;
            await new Promise(r => setTimeout(r, tempoEspera));

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODELO_PRIMARY}:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Você é suporte Bsoft TMS, somente responderá se baseando no que estiver no banco de dados que você tem 
						disponível para consultar, caso não encontrar retornará a seguinte mensagem:
						Não encontramos o que procura no manual, podes clicar no feedback como negativo e deixar sua sugestão caso encontrar a solução
						do seu problema, assim você me ajuda a conhecer mais sobre o assunto. Preciso que responda as perguntas de forma bem detalhada com passo a passo se disponível no manual, apresentando o caminho de onde executar a operação que perguntarem no sistema.
						Se por exemplo perguntarem "Como emitir um ct-e?" Você irá responder o passo a passo de como emitir no sistema.
						Contexto: ${context}\nPergunta: ${question}` }] }]
						
                    })
                });
                const data = await response.json();
                if (!response.ok || data.error) return executarCiclo(tentativa + 1);
                
                let aiText = data.candidates[0].content.parts[0].text;
                loadingDiv.innerHTML = aiText.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                
                // Adicionar UI de Feedback
                const fbDiv = document.createElement('div');
                fbDiv.className = 'feedback-area';
                fbDiv.innerHTML = `
                    <span>Ajudou?</span>
                    <button class="feedback-btn" onclick="saveFeedback(${logIndex}, 'positivo', this)">👍</button>
                    <button class="feedback-btn" onclick="saveFeedback(${logIndex}, 'negativo', this)">👎</button>
                `;
                loadingDiv.appendChild(fbDiv);

            } catch (e) { return executarCiclo(tentativa + 1); }
        }
        executarCiclo(1);
    }


    function openModal() {
        const body = document.getElementById('modalBody');
        body.innerHTML = currentResults.map(r => `<div class="result-item">${r.block.replace(/erro:/gi, '<strong>ERRO:</strong>').replace(/solução:/gi, '<br><strong>SOLUÇÃO:</strong>')}</div>`).join('');
        document.getElementById('resultsModal').style.display = "block";
    }
    function closeModal() { document.getElementById('resultsModal').style.display = "none"; }
    function appendMessage(sender, text) {
        const stream = document.getElementById('chatStream');
        const div = document.createElement('div');
        div.className = `message ${sender === 'user' ? 'user-msg' : 'ai-msg'}`;
        div.innerHTML = text; 
        stream.appendChild(div);
        stream.scrollTop = stream.scrollHeight;
        return div;
    }
    function fillAndSend(txt) { document.getElementById('searchInput').value = txt; handleChat(); }
</script>

</body>
</html>
