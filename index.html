<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Suporte Bsoft TMS - IA (V2.1)</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-glass: rgba(255, 255, 255, 0.96);
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.15);
            --radius: 16px;
        }
		
		/* Estilo do campo de motivo do feedback */
.reason-box {
    display: none;
    flex-direction: column; /* Coloca o botão abaixo do texto para dar mais espaço */
    gap: 8px;
    margin-top: 10px;
    width: 100%;
}

.reason-box textarea {
    width: 100%;
    min-height: 80px; /* Altura inicial maior */
    max-height: 300px; /* Limite para não quebrar o layout */
    padding: 12px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: none; /* Remove o puxador manual para usar o automático */
    outline: none;
    box-sizing: border-box;
}

.reason-box button {
    align-self: flex-end; /* Botão no canto inferior direito */
    background: var(--primary-color);
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

        body {
            font-family: 'Segoe UI', Inter, system-ui, sans-serif;
            margin: 0; padding: 0;
            background-color: #f0f2f5;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url("https://bsoft.com.br/blog/wp-content/uploads/2025/03/bsoft-960x500.webp");
            background-repeat: no-repeat; background-size: cover; background-attachment: fixed; background-position: center;
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .main-container {
            background-color: var(--bg-glass);
            width: 100%; max-width: 900px; height: 95vh;
            border-radius: var(--radius); box-shadow: var(--shadow);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        header {
            padding: 15px 20px; border-bottom: 1px solid #e2e8f0;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.98); z-index: 10;
        }
        h1 { margin: 0; font-size: 18px; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        .badge { font-size: 11px; background:#dcfce7; color:#166534; padding:3px 8px; border-radius:12px; font-weight: bold; }

        /* Botão de Analytics no Header */
        .btn-stats {
            font-size: 14px; background: #f1f5f9; border: 1px solid #e2e8f0;
            padding: 5px 12px; border-radius: 8px; cursor: pointer; color: #475569;
            display: flex; align-items: center; gap: 5px; transition: 0.2s;
        }
        .btn-stats:hover { background: #e2e8f0; }

        #chatStream {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
            background-color: #f8fafc; scroll-behavior: smooth;
        }

        .message {
            max-width: 85%; padding: 12px 16px; border-radius: 12px;
            line-height: 1.5; font-size: 15px; position: relative; word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        .user-msg {
            align-self: flex-end; background-color: var(--primary-color);
            color: white; border-bottom-right-radius: 2px; box-shadow: 0 2px 5px rgba(37,99,235,0.2);
        }
        .ai-msg {
            align-self: flex-start; background-color: white;
            color: #1e293b; border: 1px solid #e2e8f0; border-bottom-left-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Feedback UI */
        .feedback-area {
            display: flex; gap: 10px; margin-top: 10px; padding-top: 8px;
            border-top: 1px dashed #e2e8f0; font-size: 12px; color: #64748b; align-items: center;
        }
        .feedback-btn {
            background: white; border: 1px solid #e2e8f0; border-radius: 4px;
            cursor: pointer; padding: 2px 8px; transition: 0.2s;
        }
        .feedback-btn:hover { background: #f1f5f9; }
        .feedback-btn.active-up { background: #dcfce7; border-color: #22c55e; color: #166534; }
        .feedback-btn.active-down { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

        #btnOfflineResults {
            display: none; position: absolute; right: 25px; bottom: 110px;
            background-color: #facc15; color: #854d0e; border: none;
            padding: 12px 20px; border-radius: 25px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 100;
            font-size: 14px; transition: 0.3s;
        }
        #btnOfflineResults:hover { background-color: #fde047; transform: scale(1.05); }

        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: white; margin: 5vh auto; padding: 25px;
            width: 90%; max-width: 700px; border-radius: var(--radius);
            max-height: 85vh; overflow-y: auto; position: relative; box-shadow: var(--shadow);
        }
        .close-modal { position: sticky; top: 0; float: right; font-size: 28px; font-weight: bold; cursor: pointer; color: #94a3b8; }

        .input-area { padding: 20px; background: white; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; align-items: center; }
        #searchInput { flex: 1; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 24px; font-size: 15px; outline: none; }
        .send-btn { width: 45px; height: 45px; background: var(--primary-color); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center; }

        .result-item { background: #f8fafc; padding: 15px; border-left: 4px solid #f59e0b; margin-bottom: 15px; border-radius: 6px; font-size: 14px; color: #334155; }
        .suggestions { padding: 10px 20px; background: #f1f5f9; font-size: 12px; white-space: nowrap; overflow-x: auto; border-top: 1px solid #e2e8f0; }
        .suggestions a { color: #2563eb; text-decoration: none; cursor: pointer; margin-right: 8px; background: white; padding: 4px 10px; border-radius: 12px; border: 1px solid #e2e8f0; display: inline-block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media screen and (max-width: 600px) {
            .main-container { width: 100%; height: 100vh; border-radius: 0; }
            #btnOfflineResults { bottom: 130px; right: 15px; padding: 10px 15px; font-size: 12px; }
            .btn-stats span { display: none; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>🤖 Suporte Bsoft <span class="badge">Online</span></h1>
        <div style="display: flex; gap: 8px;">
            <button class="btn-stats" onclick="showAnalytics()">📊 <span>Relatório</span></button>
            <button onclick="checkPassword()" style="border:none; background:none; cursor:pointer; font-size:18px; padding: 5px;">🔑</button>
        </div>
    </header>

    <div id="chatStream">
        <div class="message ai-msg">
            Olá! Sou o assistente Bsoft. <br>
            Posso ajudar com erros do sistema, manuais ou dúvidas técnicas. <br>
            <b>Qual é a situação?</b>
        </div>
    </div>

    <button id="btnOfflineResults" onclick="openModal()">📑 Exibir Resultados Offline</button>

    <div class="suggestions" id="topTermsBar">
        <span>Em alta:</span> 
        <a onclick="fillAndSend('CT-e sem averbação')">CT-e Averbação</a>
        <a onclick="fillAndSend('Erro de validação')">Erro Validação</a>
        <a onclick="fillAndSend('MDF-e Encerrado')">MDF-e</a>
    </div>

    <div class="input-area">
        <input type="text" id="searchInput" placeholder="Digite sua dúvida..." autofocus>
        <button class="send-btn" onclick="handleChat()">➤</button>
    </div>
</div>

<div id="resultsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="color: #1e293b; font-size: 18px; margin-top: 0;">🔍 Manual Técnico: Resultados Offline</h2>
        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin-bottom: 20px;">
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const GITHUB_RAW_URL = "https://raw.githubusercontent.com/lucasborgescamargo1994-blip/Pessoal/main/banco_dados.txt.txt";
    const GITHUB_PAGE_URL = "https://github.com/lucasborgescamargo1994-blip/Pessoal/blob/main/banco_dados.txt.txt";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8CAmTxO2pEmtc9ZILYJEBh3NX4j_RdlIk3-4gNfTnG3Ki-8_qWtYTCdfLUfHpPNep/exec";
    const p1 = "AIzaSyBCzkv7";
    const p2 = "zwGqEiz7dTmeKs";
    const p3 = "yLJeTfdEGX04o";
    const GEMINI_API_KEY = p1 + p2 + p3; 
    const CORRECT_PASSWORD = "camargo02";

    let fileContent = "";
    let chatHistory = []; 
    let currentResults = []; 
    // Analytics: Carrega do navegador ou inicia vazio
    let searchLogs = JSON.parse(localStorage.getItem('bsoft_analytics')) || [];

    const SINONIMOS = {
        "imprimir": ["gerar", "emitir", "visualizar", "danfe", "dacte", "damdf"],
        "gerar": ["emitir", "fazer", "imprimir", "criar"],
        "averbação": ["averbar", "seguro", "atm", "porto seguro"],
        "ct-e": ["cte", "conhecimento", "transporte"],
        "mdf-e": ["mdfe", "manifesto"],
        "cancelar": ["estornar", "anular", "inutilizar"],
        "pagamento": ["financeiro", "baixa", "receber", "contas"],
        "cliente": ["remetente", "destinatário", "tomador"]
    };

    window.onload = () => {
        loadData();
        const input = document.getElementById('searchInput');
        input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleChat(); });
        input.focus();
    };

    async function loadData() {
        try {
            const response = await fetch(`${GITHUB_RAW_URL}?t=${Date.now()}`);
            fileContent = await response.text();
        } catch (e) { appendMessage('ai', "⚠️ Erro ao carregar banco de dados."); }
    }

    // --- FUNÇÕES DE ANALYTICS (GLOBAL VIA GOOGLE SHEETS) ---
    async function logSearch(query, foundOffline) {
        const payload = {
            pergunta: query,
            encontrou: foundOffline ? "Sim" : "Não",
            feedback: "Pendente"
        };
        try {
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
        } catch (e) { console.error("Erro log", e); }
    }

    async function showAnalytics() {
        const modal = document.getElementById('resultsModal');
        const body = document.getElementById('modalBody');
        const title = document.getElementById('modalTitle');
        
        title.innerText = "📊 Relatório Global de Operação";
        body.innerHTML = "<em>Carregando dados da planilha global...</em>";
        modal.style.display = "block";

        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            let html = `<table style="width:100%; font-size:12px; border-collapse: collapse;">
                        <tr style="background:#f1f5f9; text-align:left;">
                            <th style="padding:8px;">Data</th>
                            <th style="padding:8px;">Pergunta</th>
                            <th style="padding:8px;">Manual?</th>
                            <th style="padding:8px;">Feedback</th>
                        </tr>`;
            
            data.slice(1).reverse().slice(0, 20).forEach(row => {
                const dt = row[0] ? new Date(row[0]).toLocaleDateString() : '-';
                html += `<tr style="border-bottom:1px solid #eee;">
                    <td style="padding:8px; color:gray;">${dt}</td>
                    <td style="padding:8px;">${row[1]}</td>
                    <td style="padding:8px;">${row[2] === "Sim" ? '✅' : '❌'}</td>
                    <td style="padding:8px;">${row[3] || '-'}</td>
                </tr>`;
            });
            html += "</table><p style='font-size:10px; color:gray; margin-top:10px;'>* Exibindo as últimas 20 interações globais.</p>";
            body.innerHTML = html;
        } catch (e) {
            body.innerHTML = "❌ Erro ao buscar relatório global da planilha.";
        }
    }

    function saveFeedback(logIndex, type, btn) {
    const parent = btn.parentElement;
    
    if (type === 'positivo') {
        logSearch("FEEDBACK_POSITIVO", true); 
        parent.innerHTML = "<span style='color:#166534; font-weight:bold;'>Obrigado! 👍</span>";
    } else {
        parent.innerHTML = `
            <div class="reason-box" style="display:flex;">
                <textarea 
                    id="reason_${logIndex}" 
                    placeholder="Pode detalhar o que houve? (Ex: Faltou o passo X, o erro persiste...)"
                    oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                ></textarea>
                <button onclick="sendDetailedFeedback(${logIndex}, this)">Enviar Feedback</button>
            </div>
        `;
        // Foca na caixa automaticamente ao abrir
        setTimeout(() => document.getElementById(`reason_${logIndex}`).focus(), 100);
    }
}

	async function sendDetailedFeedback(logIndex, btn) {
    const textarea = document.getElementById(`reason_${logIndex}`);
    const motivo = textarea.value.trim();
    
    if (!motivo) {
        alert("Por favor, descreva o problema antes de enviar.");
        return;
    }

    logSearch(`FEEDBACK_NEGATIVO: ${motivo}`, false);
    
    const container = btn.parentElement.parentElement;
    container.innerHTML = "<span style='color:#991b1b; font-weight:bold;'>Feedback detalhado enviado. Obrigado pela ajuda!</span>";
}


    // --- LÓGICA DE CHAT ---
    function handleChat() {
        const input = document.getElementById('searchInput');
        const query = input.value.trim();
        if (!query) return;

        appendMessage('user', query);
        input.value = "";

        const results = searchDatabaseLogic(query);
        currentResults = results; 
        
        // Registrar busca no analytics
        logSearch(query, results.length > 0);
        const logIndex = searchLogs.length - 1;

        const btnOffline = document.getElementById('btnOfflineResults');
        btnOffline.style.display = results.length > 0 ? "block" : "none";

        let contextForAI = results.length > 0 
            ? `DADOS DO MANUAL:\n${results.slice(0, 4).map(r => r.block).join("\n---\n")}`
            : `Busca geral de logística/TMS.`;

        askAIWithRotation(query, contextForAI, logIndex);
    }

    function searchDatabaseLogic(query) {
        if (!fileContent) return [];
        const qLower = query.toLowerCase();
        const stopWords = ["como", "fazer", "o", "a", "de", "do", "da", "em", "para", "erro", "no", "na", "está", "com"];
        let searchTerms = qLower.split(' ').filter(word => !stopWords.includes(word) && word.length > 2);
        const blocks = fileContent.split('###');
        let scoredResults = [];

        blocks.forEach(block => {
            if (!block.trim()) return;
            let score = 0;
            const blockLower = block.toLowerCase();
            if (blockLower.includes(qLower)) score += 150;
            searchTerms.forEach(word => { if (blockLower.includes(word)) score += 40; });
            if (score > 0) scoredResults.push({ block, score });
        });
        return scoredResults.sort((a, b) => b.score - a.score);
    }

    function openModal() {
        const modal = document.getElementById('resultsModal');
        const body = document.getElementById('modalBody');
        const title = document.getElementById('modalTitle');
        title.innerText = "🔍 Manual Técnico: Resultados Offline";
        body.innerHTML = currentResults.map(r => `
            <div class="result-item">
                ${formatBlock(r.block)}
                <div style="font-size:10px; color:#94a3b8; text-align:right; margin-top:8px; font-weight:bold;">Relevância: ${r.score}</div>
            </div>
        `).join('');
        modal.style.display = "block";
    }

    function closeModal() { document.getElementById('resultsModal').style.display = "none"; }

    window.onclick = (event) => {
        if (event.target == document.getElementById('resultsModal')) closeModal();
    }

    function appendMessage(sender, text) {
        const stream = document.getElementById('chatStream');
        const div = document.createElement('div');
        div.className = `message ${sender === 'user' ? 'user-msg' : 'ai-msg'}`;
        div.innerHTML = text; 
        stream.appendChild(div);
        stream.scrollTop = stream.scrollHeight;
        return div;
    }

    function formatBlock(b) {
        return b.trim()
            .replace(/erro:/gi, '<strong style="color:#b45309">❌ ERRO:</strong>')
            .replace(/solução:/gi, '<br><strong style="color:#15803d">✅ SOLUÇÃO:</strong>')
            .replace(/\n/g, ' ');
    }

    async function askAIWithRotation(question, context, logIndex) {
        const loadingDiv = appendMessage('ai', '<em>🧠 Iniciando busca técnica...</em>');
        const MODELO_PRIMARY = "gemma-3-27b-it";
        const maxTentativas = 5;

        async function executarCiclo(tentativa) {
            if (tentativa > maxTentativas) {
                loadingDiv.innerHTML = "❌ Servidor sobrecarregado. Tente novamente.";
                return;
            }
            const tempoEspera = Math.pow(2, tentativa) * 1000;
            loadingDiv.innerHTML = `<em>🧠 Buscando conhecimentos ${tentativa}/${maxTentativas}...</em>`;
            await new Promise(r => setTimeout(r, tempoEspera));

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODELO_PRIMARY}:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Você é suporte Bsoft TMS, somente responderá se baseando no que estiver no banco de dados que você tem 
						disponível para consultar, caso não encontrar retornará a seguinte mensagem:
						Não encontramos o que procura no manual, podes clicar no feedback como negativo e deixar sua sugestão caso encontrar a solução
						do seu problema, assim você me ajuda a conhecer mais sobre o assunto. Contexto: ${context}\nPergunta: ${question}` }] }]
                    })
                });
                const data = await response.json();
                if (!response.ok || data.error) return executarCiclo(tentativa + 1);
                
                let aiText = data.candidates[0].content.parts[0].text;
                loadingDiv.innerHTML = aiText.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                
                // Adicionar UI de Feedback
                const fbDiv = document.createElement('div');
                fbDiv.className = 'feedback-area';
                fbDiv.innerHTML = `
                    <span>Ajudou?</span>
                    <button class="feedback-btn" onclick="saveFeedback(${logIndex}, 'positivo', this)">👍</button>
                    <button class="feedback-btn" onclick="saveFeedback(${logIndex}, 'negativo', this)">👎</button>
                `;
                loadingDiv.appendChild(fbDiv);

            } catch (e) { return executarCiclo(tentativa + 1); }
        }
        executarCiclo(1);
    }

    function checkPassword() { if (prompt("Senha:") === CORRECT_PASSWORD) window.open(GITHUB_PAGE_URL, '_blank'); }
    function fillAndSend(txt) { document.getElementById('searchInput').value = txt; handleChat(); }
</script>

</body>
</html>
